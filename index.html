<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tetris — JS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="new-shell">
    <section class="status-bar">
      <div class="status-panel">
        <div class="status-title">SCORE</div>
        <div id="score" class="status-value">0</div>
      </div>
      <div class="status-panel">
        <div class="status-title">LINES</div>
        <div id="lines" class="status-value">0</div>
      </div>
      <button id="restart">Restart</button>
    </section>

    <section class="game-frame">
      <div class="frame-header"><span>Play Field</span></div>
      <canvas id="game" width="200" height="400"></canvas>
    </section>

    <aside class="control-panel">
      <div class="tile-card next-card">
        <div class="tile-label">Next</div>
        <canvas id="next" width="100" height="100"></canvas>
      </div>
      <div class="tile-card rules-card">
        <div class="tile-label">Controls</div>
        <div class="control-list">
          <span>← → : Move</span>
          <span>↓ : Drop</span>
          <span>↑ : Rotate</span>
          <span>Space : Hard Drop</span>
        </div>
      </div>
    </aside>
  </div>
  <script src="tetris.js"></script>
</body>
</html>
