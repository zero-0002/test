<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tetris — JS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <section class="game-area">
      <div class="title-bar">
        <h1>TETRIS</h1>
        <p>Classic block drop game in JavaScript</p>
      </div>
      <canvas id="game" width="200" height="400"></canvas>
    </section>

    <aside class="panel">
      <div class="panel-card stats-card">
        <div class="panel-title">Stats</div>
        <div class="stat-row"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat-row"><span>Lines</span><strong id="lines">0</strong></div>
      </div>

      <div class="panel-card next-card">
        <div class="panel-title">Next</div>
        <canvas id="next" width="80" height="80"></canvas>
      </div>

      <button id="restart">Restart Game</button>
      <p class="hint">Controls: ← → ↓ rotate: ↑  drop: Space</p>
    </aside>
  </div>
  <script src="tetris.js"></script>
</body>
</html>
