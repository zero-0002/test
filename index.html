<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tetris — JS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grid-shell">
    <header class="hero">
      <div>
        <span class="eyebrow">Retro Arcade</span>
        <h1>Block Drop</h1>
        <p>Enjoy a fresh Tetris layout with a speedway-inspired interface.</p>
      </div>
      <div class="hero-panel">
        <div class="hero-stats">
          <div>
            <p>Score</p>
            <strong id="score">0</strong>
          </div>
          <div>
            <p>Lines</p>
            <strong id="lines">0</strong>
          </div>
        </div>
        <button id="restart">Restart</button>
      </div>
    </header>

    <main class="main-content">
      <section class="game-shell">
        <canvas id="game" width="200" height="400"></canvas>
      </section>
      <aside class="side-panel">
        <div class="card next-card">
          <div class="card-title">Next Piece</div>
          <canvas id="next" width="100" height="100"></canvas>
        </div>
        <div class="card instructions-card">
          <div class="card-title">Controls</div>
          <ul>
            <li>← → : Move</li>
            <li>↓ : Soft drop</li>
            <li>↑ : Rotate</li>
            <li>Space : Hard drop</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>
  <script src="tetris.js"></script>
</body>
</html>
